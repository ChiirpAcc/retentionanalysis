// =============================================================================
// UNCERTAINTY MODEL — drop-in replacement for scoreWinRate / scoreChurn calls
// in the Deal Forecast page.
//
// WHERE THIS GOES:
//   Replace the existing <script> block that contains window.scoreWinRate and
//   window.scoreChurn with this block. All other scripts are unchanged.
//
// WHAT CHANGES IN THE FORECAST PAGE update() FUNCTION:
//   1. Replace:  const wr = scoreWinRate(mrr, ob, fc_fm, D);
//      With:     const { point: wr, wrLo, wrHi, tier } = winRateWithBand(mrr, ob, fc_fm);
//
//   2. Replace:  const ch = scoreChurn(mrr, ob, fc_fm, D);
//      With:     const { point: ch, chLo, chHi } = churnWithBand(mrr, ob, fc_fm);
//
//   3. Feed the bands into the UI render calls below.
//
// WHY THESE NUMBERS:
//   WR_BASE_SE  = 2.92pp  OLS residual std error (R²=0.916, n=14 monthly obs, df_resid=5)
//   WR_T        = 1.476   t-value at 80% CI with 5 residual degrees of freedom
//   CH_BASE_SE  = 8.0pp   Derived from logit Brier score 0.2245, AUC 0.667 (n=2,595)
//   CH_T        = 1.282   z-value at 80% CI (large n)
//
//   Extrapolation penalty on win rate:
//     Each 5pp the raw score sits outside the [8%, 40%] clamp range doubles the SE.
//     This reflects that the elastic-net model was trained on monthly aggregates and
//     has no observations in those regions — the clamp is a hard guardrail, not a
//     soft prior.
// =============================================================================

(function () {

  // ── Constants ────────────────────────────────────────────────────────────
  window.CALIBRATION = 1;

  const WR_LO = 0.08;      // clamp floor
  const WR_HI = 0.40;      // clamp ceiling
  const WR_BASE_SE = 0.0292; // OLS RSE: sqrt(SS_resid / df_resid), df_resid=5, R²=0.916
  const WR_T       = 1.476;  // t(0.10, df=5) — 80% CI
  const CH_BASE_SE = 0.080;  // conservative SE from Brier=0.2245, AUC=0.667
  const CH_T       = 1.282;  // z(0.10) — 80% CI

  // ── Win-rate elastic-net model ────────────────────────────────────────────
  window.WINRATE_MODEL = {
    intercept: 0.223357,
    win_rate_min_clamp: WR_LO,
    win_rate_max_clamp: WR_HI,
    features: [
      { name: 'avg_coupon_15pct', mean: 0.052683, std: 0.129184, coef:  0.005573 },
      { name: 'avg_coupon_25pct', mean: 0.026113, std: 0.078158, coef:  0.045761 },
      { name: 'avg_free_mo',      mean: 0.699680, std: 0.402589, coef:  0.000000 },
      { name: 'avg_log_mrr',      mean: 6.494034, std: 0.304220, coef: -0.067788 },
      { name: 'avg_ob_pct',       mean: 0.708795, std: 0.456633, coef: -0.203934 },
      { name: 'ix_mrr_free',      mean: 4.451093, std: 2.490561, coef: -0.073078 },
      { name: 'ix_mrr_ob',        mean: 4.502319, std: 2.816991, coef:  0.059188 },
      { name: 'ix_ob_free',       mean: 0.585069, std: 0.524263, coef:  0.149384 },
    ],
  };

  // Raw (unclamped) model score — needed to measure extrapolation distance.
  function _scoreRaw(mrr, obPct, freeMonths) {
    const logMrr = Math.log(Math.max(Number(mrr) || 1, 1));
    const fm = Math.min(Math.max(Number(freeMonths) || 0, 0), 6);
    const ob = Math.max(Number(obPct) || 0, 0);
    const f = {
      avg_log_mrr:      logMrr,
      avg_ob_pct:       ob,
      avg_free_mo:      fm,
      ix_mrr_ob:        logMrr * ob,
      ix_mrr_free:      logMrr * fm,
      ix_ob_free:       ob * fm,
      avg_coupon_15pct: 0,  // coupon removed from forecast; no-coupon baseline
      avg_coupon_25pct: 0,
    };
    let score = WINRATE_MODEL.intercept;
    for (const feat of WINRATE_MODEL.features) {
      const raw = f[feat.name] !== undefined ? f[feat.name] : feat.mean;
      score += feat.coef * ((raw - feat.mean) / (feat.std || 1));
    }
    return score;
  }

  // ── scoreWinRate — backward-compatible point estimate ────────────────────
  // Existing callers (explorer, home charts) use this signature unchanged.
  window.scoreWinRate = function (mrr, obPct, freeMonths, discountPct) {
    const raw = _scoreRaw(mrr, obPct, freeMonths);
    return Math.min(Math.max(raw, WR_LO), WR_HI);
  };

  // ── winRateWithBand — new forecast-page call ──────────────────────────────
  // Returns { point, wrLo, wrHi, rawScore, extrapolation, tier }
  //
  //   point        — clamped point estimate (same as scoreWinRate)
  //   wrLo/wrHi    — 80% CI bounds, growing with extrapolation distance
  //   rawScore     — unclamped score (show to user when extrapolated)
  //   extrapolation — pp past the clamp (0 when in range)
  //   tier         — 'HIGH' | 'MODERATE' | 'LOW' | 'EXTRAPOLATED'
  window.winRateWithBand = function (mrr, obPct, freeMonths) {
    const raw   = _scoreRaw(mrr, obPct, freeMonths);
    const point = Math.min(Math.max(raw, WR_LO), WR_HI);

    // How far outside the trained range?
    const extrapolation = Math.max(0, WR_LO - raw) + Math.max(0, raw - WR_HI);

    // SE grows linearly with extrapolation distance: doubles every 5pp past clamp.
    const se = WR_BASE_SE * (1 + extrapolation / 0.05);

    const wrLo = Math.max(0.01, point - WR_T * se);
    const wrHi = Math.min(0.99, point + WR_T * se);

    // Confidence tier
    let tier;
    if (extrapolation === 0) {
      tier = 'HIGH';
    } else if (extrapolation < 0.05) {
      tier = 'MODERATE';        // raw score within 5pp of the clamp boundary
    } else if (extrapolation < 0.15) {
      tier = 'LOW';             // 5–15pp outside
    } else {
      tier = 'EXTRAPOLATED';    // >15pp outside — essentially no data here
    }

    return { point, wrLo, wrHi, rawScore: raw, extrapolation, tier, se };
  };

  // ── scoreChurn — backward-compatible point estimate ───────────────────────
  window.scoreChurn = function (mrr, obPct, freeMonths, discountPct) {
    const logMrr = Math.log(Math.max(Number(mrr) || 1, 1));
    const ob     = Math.max(Number(obPct) || 0, 0);
    const fm     = Math.min(Math.max(Number(freeMonths) || 0, 0), 6);
    let churn = 0.50 + 0.09 * (ob - 0.70) + 0.05 * fm - 0.05 * (logMrr - 6.49);
    return Math.min(Math.max(churn, 0.12), 0.85);
  };

  // ── churnWithBand — new forecast-page call ────────────────────────────────
  // Returns { point, chLo, chHi }
  //
  //   Uncertainty is fixed at CH_BASE_SE = 8pp (from logit Brier=0.2245,
  //   AUC=0.667 on 2,595 customers). Unlike win rate there is no additional
  //   extrapolation penalty because the churn model is a hand approximation
  //   — it's uniformly uncertain across its full range.
  window.churnWithBand = function (mrr, obPct, freeMonths) {
    const point = scoreChurn(mrr, obPct, freeMonths, 0);
    const chLo  = Math.max(0.12, point - CH_T * CH_BASE_SE);
    const chHi  = Math.min(0.85, point + CH_T * CH_BASE_SE);
    return { point, chLo, chHi };
  };

  // ── Billing helper (no coupon) ────────────────────────────────────────────
  window.billedMrrForMonth = function (mrr, freeMonths, discountPct, month) {
    return month <= Number(freeMonths) ? 0 : Number(mrr);
  };

  // ── LTV / payback (unchanged, used by explorer + forecast) ───────────────
  window.annualChurnToMonthlyHazard = function (c) {
    c = Math.min(Math.max(Number(c) || 0, 0), 0.95);
    return 1 - Math.pow(1 - c, 1 / 12);
  };

  window.ltvBreakdown = function (mrr, obPct, freeMonths, discountPct, horizonMonths) {
    const horizon     = Number(horizonMonths) || 24;
    const annualChurn = scoreChurn(mrr, obPct, freeMonths, discountPct);
    const h           = annualChurnToMonthlyHazard(annualChurn);
    const upfront     = Number(mrr) * Number(obPct) * CALIBRATION;
    let survival = 1, mrrCash = 0;
    for (let t = 1; t <= horizon; t++) {
      survival *= (1 - h);
      mrrCash  += billedMrrForMonth(mrr, freeMonths, discountPct, t) * survival * CALIBRATION;
    }
    return { upfront, mrrCash, calibrated: upfront + mrrCash, annualChurn };
  };

  // LTV computed at a specific churn rate — used to propagate churn uncertainty into LTV.
  window.ltvAtChurn = function (mrr, obPct, freeMonths, churn, horizonMonths) {
    const horizon = Number(horizonMonths) || 24;
    const h       = annualChurnToMonthlyHazard(churn);
    const upfront = Number(mrr) * Number(obPct) * CALIBRATION;
    let survival = 1, mrrCash = 0;
    for (let t = 1; t <= horizon; t++) {
      survival *= (1 - h);
      mrrCash  += billedMrrForMonth(mrr, freeMonths, 0, t) * survival * CALIBRATION;
    }
    return upfront + mrrCash;
  };

  window.paybackMonth = function (mrr, obPct, freeMonths, discountPct, cac) {
    const annualChurn = scoreChurn(mrr, obPct, freeMonths, discountPct);
    const h           = annualChurnToMonthlyHazard(annualChurn);
    let survival = 1;
    let cash     = Number(mrr) * Number(obPct) * CALIBRATION;
    if (cash >= cac) return 0;
    for (let t = 1; t <= 60; t++) {
      survival *= (1 - h);
      cash     += billedMrrForMonth(mrr, freeMonths, discountPct, t) * survival * CALIBRATION;
      if (cash >= cac) return t;
    }
    return null;
  };

})();
